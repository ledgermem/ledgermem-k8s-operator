apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workspaces.ledgermem.io
spec:
  group: ledgermem.io
  names:
    kind: Workspace
    listKind: WorkspaceList
    plural: workspaces
    singular: workspace
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [clusterRef, name]
              properties:
                clusterRef: { type: string }
                name: { type: string }
                slug: { type: string }
                plan: { type: string }
                retentionDays: { type: integer }
            status:
              type: object
              properties:
                workspaceId: { type: string }
                conditions:
                  type: array
                  items:
                    type: object
