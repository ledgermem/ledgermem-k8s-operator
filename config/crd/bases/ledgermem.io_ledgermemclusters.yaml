apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ledgermemclusters.ledgermem.io
spec:
  group: ledgermem.io
  names:
    kind: LedgerMemCluster
    listKind: LedgerMemClusterList
    plural: ledgermemclusters
    singular: ledgermemcluster
    shortNames: [lmc]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [postgres, vectorStore]
              properties:
                image:
                  type: string
                  default: "ghcr.io/ledgermem/ledgermem:latest"
                replicas:
                  type: integer
                  minimum: 1
                  default: 2
                postgres:
                  type: object
                  required: [host, database]
                  properties:
                    host: { type: string }
                    port: { type: integer }
                    database: { type: string }
                    sslMode: { type: string }
                vectorStore:
                  type: object
                  required: [provider]
                  properties:
                    provider:
                      type: string
                      enum: [pgvector, pinecone, qdrant]
                    indexName: { type: string }
            status:
              type: object
              properties:
                readyReplicas: { type: integer }
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type: { type: string }
                      status: { type: string }
                      reason: { type: string }
                      message: { type: string }
                      lastTransitionTime: { type: string, format: date-time }
