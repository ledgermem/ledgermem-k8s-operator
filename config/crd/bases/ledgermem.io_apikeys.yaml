apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apikeys.getmnemo.io
spec:
  group: getmnemo.io
  names:
    kind: ApiKey
    listKind: ApiKeyList
    plural: apikeys
    singular: apikey
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [workspaceRef, name]
              properties:
                workspaceRef: { type: string }
                name: { type: string }
                scopes:
                  type: array
                  items: { type: string }
                secretName: { type: string }
            status:
              type: object
              properties:
                apiKeyId: { type: string }
                secretName: { type: string }
                conditions:
                  type: array
                  items:
                    type: object
