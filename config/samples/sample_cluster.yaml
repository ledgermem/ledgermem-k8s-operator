apiVersion: v1
kind: Secret
metadata:
  name: getmnemo-postgres
  namespace: default
type: Opaque
stringData:
  password: change-me
---
apiVersion: getmnemo.io/v1alpha1
kind: MnemoCluster
metadata:
  name: prod
  namespace: default
spec:
  image: ghcr.io/getmnemo/getmnemo:latest
  replicas: 2
  postgres:
    host: postgres.default.svc.cluster.local
    port: 5432
    database: getmnemo
    sslMode: require
    secretRef:
      name: getmnemo-postgres
      key: password
  vectorStore:
    provider: pgvector
    indexName: getmnemo_vectors
---
apiVersion: getmnemo.io/v1alpha1
kind: Workspace
metadata:
  name: acme
  namespace: default
spec:
  clusterRef: prod
  name: Acme Corp
  slug: acme
  plan: enterprise
  retentionDays: 365
---
apiVersion: getmnemo.io/v1alpha1
kind: ApiKey
metadata:
  name: acme-ci
  namespace: default
spec:
  workspaceRef: acme
  name: ci-bot
  scopes:
    - memories:read
    - memories:write
  secretName: acme-ci-token
